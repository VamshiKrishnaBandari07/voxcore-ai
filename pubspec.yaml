name: voicecode
description: VoiceCode — offline-first AI speech improvement platform.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  sqflite: ^2.4.1
  sqflite_common_ffi: ^2.3.4+4
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.0
  fl_chart: ^0.69.2
  google_fonts: ^6.2.1
  record: ^7.1.0
  record_windows: 2.1.0
  path_provider: 2.1.4
  path_provider_windows: 2.2.1
  just_audio: ^0.9.42
  just_audio_windows: ^0.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_android: 2.2.15
